<div class="flex items-center justify-center min-h-screen bg-gray-900 font-body">
  @if (user$ | async; as user) {
    <div class="w-full max-w-2xl p-8 space-y-6 bg-gray-800 rounded-xl shadow-lg">
      <header class="text-center">
        <h1 class="text-4xl font-bold text-white font-heading">
          ¡Bienvenido, {{ user.username }}!
        </h1>
        <p class="text-gray-400 mt-2">Sesión iniciada correctamente.</p>
      </header>
      
      <div class="p-6 mt-4 bg-gray-700/50 border border-gray-700 rounded-lg text-left space-y-4">
        <h2 class="text-xl font-semibold text-purple-400 font-heading mb-4">Tu Perfil</h2>
        
        <div class="flex justify-between items-center">
          <p class="text-gray-400 text-lg">Email:</p>
          <p class="font-body text-lg text-white">{{ user.email }}</p>
        </div>
      </div>
      
      <div class="pt-4">
        <button 
          (click)="logout()"
          class="w-full py-3 px-4 bg-black text-white font-bold rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-800 transition-colors">
          Cerrar Sesión
        </button>
      </div>
    </div>
  } @else {
    <div class="text-center">
      <p class="text-2xl text-white">Cargando perfil...</p>
    </div>
  }
</div>
