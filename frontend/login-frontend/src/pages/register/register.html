<div class="flex items-center justify-center min-h-screen bg-gray-900 font-body">
  <div class="w-full max-w-md p-8 space-y-6 bg-gray-800 rounded-xl shadow-lg">
    
    <header class="text-center font-heading">
      <h1 class="text-3xl font-bold text-white">Crea tu Cuenta</h1>
      <p class="text-gray-400 mt-2">Únete a nuestra plataforma.</p>
    </header>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">

      @if (errorMessage) {
        <div class="bg-red-900/50 border border-red-600 text-red-300 px-4 py-3 rounded-lg text-center" role="alert">
          <span>{{ errorMessage }}</span>
        </div>
      }

      <div>
        <label for="username" class="block text-sm font-medium text-gray-400 mb-2">Nombre de Usuario</label>
        <input id="username" formControlName="username" type="text" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-purple-500">
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-gray-400 mb-2">Correo Electrónico</label>
        <input id="email" formControlName="email" type="email" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-purple-500">
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-400 mb-2">Contraseña</label>
        <input id="password" formControlName="password" type="password" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-purple-500">
      </div>

      <div class="pt-2">
        <button type="submit" [disabled]="registerForm.invalid || isLoading" class="w-full py-3 px-4 bg-linear-to-r from-purple-600 to-indigo-600 text-white font-bold rounded-lg shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
          @if (isLoading) { <span>Creando cuenta...</span> } @else { <span>Registrarse</span> }
        </button>
      </div>
    </form>

    <div class="text-center">
      <p class="text-sm text-gray-400">¿Ya tienes una cuenta? 
        <a routerLink="/login" class="font-medium text-purple-400 hover:text-purple-300 hover:underline">Inicia Sesión</a>
      </p>
    </div>
  </div>
</div>
