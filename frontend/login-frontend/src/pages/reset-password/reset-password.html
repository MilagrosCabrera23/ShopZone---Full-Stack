<div class="flex items-center justify-center min-h-screen bg-gray-900 font-body">
  <div class="w-full max-w-md p-8 space-y-6 bg-gray-800 rounded-xl shadow-lg">
    
    <header class="text-center font-heading">
      <h1 class="text-3xl font-bold text-white">Establecer Nueva Contraseña</h1>
      <p class="text-gray-400 mt-2">Ingresa el código que recibiste y tu nueva contraseña.</p>
    </header>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="space-y-4">

      @if (message) {
        <div class="bg-green-500/10 border border-green-500/30 text-green-300 px-4 py-3 rounded-lg text-center" role="alert">
          <span>{{ message }}</span>
        </div>
      }
      @if (errorMessage) {
        <div class="bg-red-900/50 border border-red-600 text-red-300 px-4 py-3 rounded-lg text-center" role="alert">
          <span>{{ errorMessage }}</span>
        </div>
      }

      <div>
        <label for="email" class="block text-sm font-medium text-gray-500 mb-2">Email</label>
        <input id="email" formControlName="email" type="email" class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-gray-400 cursor-not-allowed">
      </div>

      <div>
        <label for="otp_code" class="block text-sm font-medium text-gray-400 mb-2">Código de 6 dígitos</label>
        <input id="otp_code" formControlName="otp_code" type="text" placeholder="123456" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500">
      </div>

      <div>
        <label for="new_password" class="block text-sm font-medium text-gray-400 mb-2">Nueva Contraseña</label>
        <input id="new_password" formControlName="new_password" type="password" placeholder="••••••••" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500">
      </div>

      <div class="pt-2">
        <button type="submit" [disabled]="resetForm.invalid || isLoading" class="w-full py-3 px-4 bg-linear-to from-purple-600 to-indigo-600 text-white font-bold rounded-lg shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
          @if (isLoading) { <span>Verificando...</span> } @else { <span>Restablecer Contraseña</span> }
        </button>
      </div>
    </form>
  </div>
</div>
